services:
  mongodb:
    image: mongo:8.0
    container_name: interneers_lab_2026_mongodb
    ports:
      - '27019:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example
    volumes:
      - mongodb_data:/data/db

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: interneers_elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false 
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - '9200:9200'
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ['CMD-SHELL', 'curl -s http://localhost:9200/_cluster/health | grep -q "\"status\":\"green\"\|\"status\":\"yellow\""']
      interval: 15s
      timeout: 10s
      retries: 10

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.4
    container_name: interneers_kibana
    ports:
      - '5601:5601'
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      elasticsearch:
        condition: service_healthy

  filebeat-setup:
    image: docker.elastic.co/beats/filebeat:8.13.4
    container_name: interneers_filebeat_setup
    user: root
    volumes:
      - ./filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
    depends_on:
      elasticsearch:
        condition: service_healthy
      kibana:
        condition: service_started
    entrypoint: filebeat
    command: ["setup", "-strict.perms=false", "--index-management", "-E", "output.elasticsearch.hosts=['http://elasticsearch:9200']"]
    restart: "no"

  filebeat:
    image: docker.elastic.co/beats/filebeat:8.13.4
    container_name: interneers_filebeat
    user: root                       
    volumes:
      - ./filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - ./inventory.log:/app/logs/inventory.log:ro
    depends_on:
      elasticsearch:
        condition: service_healthy
      filebeat-setup:
        condition: service_completed_successfully
    entrypoint: filebeat
    command: ["-e", "-strict.perms=false"]

volumes:
  mongodb_data:
  elasticsearch_data:
